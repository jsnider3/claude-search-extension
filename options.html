<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Claude Search Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #1a1a1a;
    }
    h1 {
      font-size: 1.4em;
      margin-bottom: 24px;
    }
    label {
      display: block;
      margin: 8px 0;
      cursor: pointer;
    }
    .url-group {
      margin: 16px 0 24px 24px;
    }
    .url-group input[type="text"] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .url-group input[type="text"]:disabled {
      background: #f5f5f5;
      color: #999;
    }
    button {
      padding: 8px 20px;
      background: #d97706;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover {
      background: #b45309;
    }
    .status {
      display: inline-block;
      margin-left: 12px;
      color: #16a34a;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>Claude Search Settings</h1>

  <label>
    <input type="radio" name="mode" value="new" checked>
    New conversation (default)
  </label>
  <label>
    <input type="radio" name="mode" value="pinned">
    Pinned conversation
  </label>

  <div class="url-group">
    <input type="text" id="conversationUrl" placeholder="https://claude.ai/chat/abc123..." disabled>
  </div>

  <button id="save">Save</button>
  <span class="status" id="status">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
